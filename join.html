<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Autocomplete Party - Join</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/player.css">
</head>
<body>

<!-- JOIN SCREEN -->
<div id="screen-join" class="pscreen active">
  <div class="p-logo">AUTO<span>COMPLETE</span></div>
  <div class="p-card">
    <div class="p-title">Enter your name</div>
    <input type="text" id="input-code" class="p-input" placeholder="Room code" maxlength="4" autocomplete="off" autocapitalize="characters" />
    <input type="text" id="input-name" class="p-input" placeholder="Your name" maxlength="16" autocomplete="off" />
    <button class="p-btn" onclick="joinGame()">Join →</button>
    <div class="p-error" id="join-error"></div>
  </div>
</div>

<!-- CONNECTING -->
<div id="screen-connecting" class="pscreen">
  <div class="p-logo">AUTO<span>COMPLETE</span></div>
  <div class="p-status">Connecting...</div>
  <div class="p-spinner"></div>
</div>

<!-- WAITING LOBBY -->
<div id="screen-waiting" class="pscreen">
  <div class="p-logo">AUTO<span>COMPLETE</span></div>
  <div class="p-card">
    <div class="player-avatar" id="p-avatar"></div>
    <div class="p-name" id="p-display-name"></div>
    <div class="p-status-text">Waiting for host to start...</div>
    <div class="p-players-joined" id="p-players-joined"></div>
  </div>
</div>

<!-- GUESSING SCREEN -->
<div id="screen-guessing" class="pscreen">
  <div class="p-game-header">
    <div class="p-round" id="p-round-label">Round 1</div>
    <div class="p-score" id="p-score-display">0 pts</div>
  </div>

  <div class="p-search-prompt">
    <div class="p-prompt-label">Complete the search:</div>
    <div class="p-keyword" id="p-keyword"></div>
  </div>

  <div class="p-guess-area">
    <div class="p-hint-strip" id="p-hint-strip"></div>
    <div class="p-input-row">
      <input type="text" id="p-guess-input" class="p-guess-field" placeholder="type your guess..." autocomplete="off" autocapitalize="none" />
      <button class="p-send-btn" id="p-send-btn" onclick="submitGuess()">→</button>
    </div>
    <div class="p-guesses-list" id="p-guesses-list"></div>
  </div>

  <div class="p-answers-found">
    <div class="p-found-label">Found</div>
    <div class="p-found-count" id="p-found-count">0 / 5</div>
  </div>
</div>

<!-- ROUND END -->
<div id="screen-round-end" class="pscreen">
  <div class="p-logo">AUTO<span>COMPLETE</span></div>
  <div class="p-card">
    <div class="p-round-result" id="p-round-result"></div>
    <div class="p-score-big" id="p-score-big"></div>
    <div class="p-answers-reveal" id="p-answers-reveal"></div>
    <button class="p-btn" id="p-ready-btn" style="display:none">Ready to continue →</button>
    <div class="p-ready-count" id="p-ready-count"></div>
  </div>
</div>

<!-- GAME OVER -->
<div id="screen-gameover" class="pscreen">
  <div class="p-logo">AUTO<span>COMPLETE</span></div>
  <div class="p-card">
    <div class="p-title">Game Over!</div>
    <div class="p-final-scores" id="p-final-scores"></div>
  </div>
</div>

<script src="https://unpkg.com/peerjs@0.3.16/dist/peerjs.min.js"></script>
<script src="js/player.js"></script>
</body>
</html>
